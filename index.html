<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>dC Viagens 5.0</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

nav {
  background: #111;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  flex-wrap: wrap;
}

nav button {
  background: none;
  border: none;
  color: white;
  margin-left: 10px;
  font-weight: bold;
  cursor: pointer;
}

nav button:hover {
  color: #ff6600;
}

.container {
  padding: 20px;
  text-align: center;
}

.aba { display: none; }
.ativa { display: block; }

.card {
  background: white;
  width: 280px;
  margin: 10px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  padding-bottom: 10px;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.destinos {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  background: #ff6600;
  color: white;
  border: none;
  padding: 8px 12px;
  margin-top: 8px;
  border-radius: 5px;
  cursor: pointer;
}

.cart {
  background: white;
  max-width: 600px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 80%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container ativa">
  <h2>Login dC Viagens</h2>

  <input id="user" placeholder="Nome de usuário"><br>
  <input id="pass" type="password" placeholder="Senha"><br>

  <button class="btn" onclick="login()">Entrar</button>
  <button class="btn" onclick="registrar()">Criar conta</button>
</div>

<!-- SISTEMA -->
<div id="app" class="container">

<nav>
  <h2>dC Viagens</h2>
  <div>
    <span id="usuarioLogado"></span>
    <button onclick="mostrar('destinos')">Destinos</button>
    <button onclick="mostrar('carrinho')">Carrinho 🛒 (<span id="qtd">0</span>)</button>
    <button onclick="logout()">Sair</button>
  </div>
</nav>

<!-- DESTINOS -->
<div id="destinos" class="aba ativa container">
  <h2>Destinos</h2>

  <div class="destinos">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a">
      <h3>Paris</h3>
      <p>R$ 3999</p>
      <button class="btn" onclick="add('Paris',3999)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c">
      <h3>Dubai</h3>
      <p>R$ 5499</p>
      <button class="btn" onclick="add('Dubai',5499)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <h3>Maldivas</h3>
      <p>R$ 6500</p>
      <button class="btn" onclick="add('Maldivas',6500)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://res.cloudinary.com/traveltripperweb/image/upload/c_fit,f_auto,h_1200,q_auto,w_1200/v1627681436/bgvlhnmlrwyhm2xwdock.jpg">
      <h3>Miami</h3>
      <p>R$ 7299</p>
      <button class="btn" onclick="add('Miami',7299)">Comprar</button>
    </div>

  </div>
</div>

<!-- CARRINHO -->
<div id="carrinho" class="aba container">
  <h2>Carrinho</h2>

  <div class="cart">
    <div id="lista"></div>

    <h3>Total: R$ <span id="total">0</span></h3>

    <button class="btn" onclick="finalizar()">Finalizar no WhatsApp</button>
  </div>
</div>

</div>

<script>
let user = localStorage.getItem("user");
let carrinho = JSON.parse(localStorage.getItem("cart_"+user)) || [];

function registrar(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(!u || !p){
    alert("Preencha tudo!");
    return;
  }

  localStorage.setItem("user_"+u, p);
  alert("Conta criada!");
}

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let saved = localStorage.getItem("user_"+u);

  if(saved === p){
    localStorage.setItem("user", u);
    location.reload();
  } else {
    alert("Login inválido!");
  }
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

if(user){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("usuarioLogado").innerText = "👤 " + user;
}

function mostrar(id){
  document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function salvar(){
  localStorage.setItem("cart_"+user, JSON.stringify(carrinho));
}

function add(nome,preco){
  carrinho.push({nome,preco});
  salvar();
  atualizar();
}

function atualizar(){
  document.getElementById("qtd").innerText = carrinho.length;

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;

  carrinho.forEach(i=>{
    total += i.preco;
    lista.innerHTML += `<div>${i.nome} - R$ ${i.preco}</div>`;
  });

  document.getElementById("total").innerText = total;
}

function finalizar(){
  let msg = "Pedido de: " + user + "\n\n";

  carrinho.forEach(i=>{
    msg += `- ${i.nome} R$ ${i.preco}\n`;
  });

  let url = "https://wa.me/5531993597938?text=" + encodeURIComponent(msg);
  window.open(url);
}

atualizar();
</script>

</body>
</html>
