<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>dC Viagens 3.0</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

nav {
  background: #111;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  align-items: center;
  flex-wrap: wrap;
}

nav button {
  background: none;
  border: none;
  color: white;
  margin-left: 10px;
  font-weight: bold;
  cursor: pointer;
}

nav button:hover {
  color: #ff6600;
}

.container {
  padding: 20px;
  text-align: center;
}

.aba { display: none; }
.ativa { display: block; }

.destinos {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  background: white;
  width: 280px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  padding-bottom: 15px;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.btn {
  background: #ff6600;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 8px;
}

.btn:hover {
  background: #e65c00;
}

.cart {
  background: white;
  max-width: 600px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  border-bottom: 1px solid #ddd;
  padding-bottom: 8px;
}

.qty-btn {
  margin: 0 5px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<nav>
  <h2>dC Viagens 3.0</h2>

  <div>
    <button onclick="mostrar('destinos')">Destinos</button>
    <button onclick="mostrar('promocoes')">Promoções</button>
    <button onclick="mostrar('pagamento')">Pagamento</button>
    <button onclick="mostrar('carrinho')">Carrinho 🛒 (<span id="qtd">0</span>)</button>
  </div>
</nav>

<!-- DESTINOS -->
<div id="destinos" class="aba ativa container">
  <h2>Destinos</h2>

  <div class="destinos">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a">
      <h3>Paris</h3>
      <p>R$ 3999</p>
      <button class="btn" onclick="addCarrinho('Paris', 3999)">Adicionar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c">
      <h3>Dubai</h3>
      <p>R$ 5499</p>
      <button class="btn" onclick="addCarrinho('Dubai', 5499)">Adicionar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <h3>Maldivas</h3>
      <p>R$ 6500</p>
      <button class="btn" onclick="addCarrinho('Maldivas', 6500)">Adicionar</button>
    </div>

    <div class="card">
      <img src="https://res.cloudinary.com/traveltripperweb/image/upload/c_fit,f_auto,h_1200,q_auto,w_1200/v1627681436/bgvlhnmlrwyhm2xwdock.jpg">
      <h3>Miami</h3>
      <p>R$ 7299</p>
      <button class="btn" onclick="addCarrinho('Miami', 7299)">Adicionar</button>
    </div>

  </div>
</div>

<!-- PROMOÇÕES -->
<div id="promocoes" class="aba container">
  <h2>Promoções</h2>

  <div class="destinos">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
      <h3>Paris Promo</h3>
      <p>R$ 3499</p>
      <button class="btn" onclick="addCarrinho('Paris Promo', 3499)">Adicionar</button>
    </div>
  </div>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="aba container">
  <h2>Pagamento</h2>

  <div class="cart">
    <p>📱 WhatsApp: (31) 993597938</p>
    <p>💳 Pix / Cartão / Transferência</p>

    <button class="btn" onclick="mostrar('carrinho')">
      Ver Carrinho
    </button>
  </div>
</div>

<!-- CARRINHO -->
<div id="carrinho" class="aba container">
  <h2>Carrinho</h2>

  <div class="cart">
    <div id="lista"></div>

    <h3>Total: R$ <span id="total">0</span></h3>

    <button class="btn" onclick="finalizar()">Finalizar no WhatsApp</button>
  </div>
</div>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvar() {
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

function mostrar(id) {
  document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function addCarrinho(nome, preco) {
  let item = carrinho.find(i => i.nome === nome);

  if (item) {
    item.qtd++;
  } else {
    carrinho.push({ nome, preco, qtd: 1 });
  }

  salvar();
  atualizar();
}

function remover(index) {
  carrinho.splice(index, 1);
  salvar();
  atualizar();
}

function mudarQtd(index, valor) {
  carrinho[index].qtd += valor;

  if (carrinho[index].qtd <= 0) {
    carrinho.splice(index, 1);
  }

  salvar();
  atualizar();
}

function atualizar() {
  document.getElementById("qtd").innerText = carrinho.reduce((a,b)=>a+b.qtd,0);

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;

  carrinho.forEach((item, index) => {
    total += item.preco * item.qtd;

    lista.innerHTML += `
      <div class="item">
        <span>${item.nome} - R$ ${item.preco}</span>

        <div>
          <span class="qty-btn" onclick="mudarQtd(${index}, -1)">➖</span>
          ${item.qtd}
          <span class="qty-btn" onclick="mudarQtd(${index}, 1)">➕</span>
          <button class="btn" onclick="remover(${index})">❌</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function finalizar() {
  if (carrinho.length === 0) {
    alert("Carrinho vazio!");
    return;
  }

  let msg = "Olá, quero comprar:\n";

  carrinho.forEach(i => {
    msg += `- ${i.nome} x${i.qtd} R$ ${i.preco * i.qtd}\n`;
  });

  let url = "https://wa.me/5531993597938?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}

atualizar();
</script>

</body>
</html>
