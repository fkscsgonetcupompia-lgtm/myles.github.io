<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>dC Viagens</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

nav {
  background: #111;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  align-items: center;
}

nav button {
  background: none;
  border: none;
  color: white;
  margin-left: 15px;
  font-weight: bold;
  cursor: pointer;
}

nav button:hover {
  color: #ff6600;
}

.container {
  padding: 20px;
  text-align: center;
}

.aba {
  display: none;
}

.ativa {
  display: block;
}

.destinos {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  width: 280px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  padding-bottom: 15px;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #ff6600;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  cursor: pointer;
}

.btn:hover {
  background: #e65c00;
}

.cart {
  background: white;
  padding: 20px;
  max-width: 500px;
  margin: auto;
  border-radius: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  border-bottom: 1px solid #ddd;
  padding-bottom: 5px;
}
</style>
</head>

<body>

<nav>
  <h2>dC Viagens</h2>
  <div>
    <button onclick="mostrar('destinos')">Destinos</button>
    <button onclick="mostrar('promocoes')">Promoções</button>
    <button onclick="mostrar('pagamento')">Pagamento</button>
    <button onclick="mostrar('carrinho')">Carrinho 🛒 (<span id="qtd">0</span>)</button>
  </div>
</nav>

<!-- DESTINOS -->
<div id="destinos" class="aba ativa container">
  <h2>Destinos</h2>

  <div class="destinos">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a">
      <h3>Paris</h3>
      <p>R$ 3999</p>
      <button class="btn" onclick="addCarrinho('Paris', 3999)">Adicionar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c">
      <h3>Dubai</h3>
      <p>R$ 5499</p>
      <button class="btn" onclick="addCarrinho('Dubai', 5499)">Adicionar</button>
    </div>

  </div>
</div>

<!-- PROMOÇÕES -->
<div id="promocoes" class="aba container">
  <h2>Promoções</h2>

  <div class="destinos">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
      <h3>Maldivas</h3>
      <p>R$ 6500</p>
      <button class="btn" onclick="addCarrinho('Maldivas', 6500)">Adicionar</button>
    </div>

  </div>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="aba container">
  <h2>Pagamento</h2>

  <div class="cart">
    <p>📱 WhatsApp: (31) 993597938</p>
    <p>💳 Pix / Cartão / Transferência</p>

    <a class="btn" target="_blank"
       href="https://wa.me/5531993597938">
      Finalizar no WhatsApp
    </a>
  </div>
</div>

<!-- CARRINHO -->
<div id="carrinho" class="aba container">
  <h2>Carrinho</h2>

  <div class="cart">
    <div id="lista"></div>

    <h3>Total: R$ <span id="total">0</span></h3>

    <a class="btn" onclick="finalizar()">Finalizar Compra</a>
  </div>
</div>

<script>
let carrinho = [];

function mostrar(id) {
  document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function addCarrinho(nome, preco) {
  carrinho.push({ nome, preco });
  atualizar();
}

function atualizar() {
  document.getElementById("qtd").innerText = carrinho.length;

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;

  carrinho.forEach(item => {
    total += item.preco;
    lista.innerHTML += `
      <div class="item">
        <span>${item.nome}</span>
        <span>R$ ${item.preco}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function finalizar() {
  let msg = "Olá, quero comprar:\n";

  carrinho.forEach(i => {
    msg += `- ${i.nome} R$ ${i.preco}\n`;
  });

  let url = "https://wa.me/5531993597938?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}
</script>

</body>
</html>
