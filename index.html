<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>dC Viagens</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
      background-size: cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .destinos {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      width: 300px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 10px 20px;
      background: #ff6600;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>dC Viagens</h1>
  <p>Descubra o mundo com os melhores preços</p>
</header>

<section>
  <h2>Destinos populares</h2>

  <div class="destinos">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a">
      <h3>Paris</h3>
      <p>Pacote 5 dias - R$ 3.999</p>
      <a href="https://wa.me/5531999999999?text=Quero%20comprar%20pacote%20para%20Paris" class="btn">Comprar</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c">
      <h3>Dubai</h3>
      <p>Pacote 7 dias - R$ 5.499</p>
      <a href="https://wa.me/5531999999999?text=Quero%20comprar%20pacote%20para%20Dubai" class="btn">Comprar</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <h3>Maldivas</h3>
      <p>Pacote 6 dias - R$ 6.999</p>
      <a href="https://wa.me/5531999999999?text=Quero%20comprar%20pacote%20para%20Maldivas" class="btn">Comprar</a>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 dC Viagens</p>
</footer>

</body>
</html>
